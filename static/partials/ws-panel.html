<div class="sidebar-ws-panel" id="wsPanel">
  <div class="ws-panel-header">
    <div class="ws-title">
      <span class="ws-dot" id="wsDot"></span>
      Live Events
      <span class="ws-status-text" id="wsStatusText">disconnected</span>
    </div>
    <div class="ws-panel-controls">
      <button class="ws-btn ws-btn-connect" id="wsConnectBtn" onclick="wsToggleConnect()">Connect</button>
      <button class="ws-btn" onclick="wsClear()">Clear</button>
    </div>
  </div>
  <div class="ws-events" id="wsEvents">
    <div class="ws-empty">Press Connect to start<br>receiving live events</div>
  </div>
</div>
