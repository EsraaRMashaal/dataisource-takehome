name: dataisource-takehome

services:
  api:
    image: dataisource/takehome-api:latest
    container_name: dataisource-takehome-api

    build:
      # Build context is the repository root — Dockerfile sits alongside docker-compose.yml.
      context: .
      dockerfile: Dockerfile

    command: uvicorn app.server:app --host 0.0.0.0 --port 8800

    ports:
      - "8800:8800"

    # .env is resolved relative to this docker-compose.yml file.
    env_file:
      - .env

    volumes:
      # SQLite database persists across restarts.
      # Path must match SQLITE_DB_PATH in .env (/app/data/...).
      - ./data:/app/data

      # Docs folder (includes sample RFQ) mounted read-only inside the container.
      - ./docs:/app/docs:ro

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8800/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

# ── Notes ─────────────────────────────────────────────────────────────────────
# Run:   docker compose up --build
# Stop:  docker compose down
#
# SQLite trade-off: the DB file lives in ./data/ via volume mount.
# For production or multi-replica deployments swap for Postgres + managed volume.
#
# GDELT polling runs as a background worker inside the api process.
# To run it as a separate container, add a second service that shares the data
# volume and overrides CMD to run the worker entrypoint directly.
